services:
  redis:
    image: redis:7-alpine
    container_name: stm-redis
    ports:
      - "46379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Neo4j is run locally (not containerized). See README.md for setup.
# Connect to it at neo4j://127.0.0.1:7687.

volumes:
  redis-data:
